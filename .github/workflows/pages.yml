name: Build and Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["Sync Gallery Data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  HF_SPACE: removeshort/removeshort-AIGC-Studio
  HF_PUBLIC_BASE_URL: https://huggingface.co/spaces/removeshort/removeshort-AIGC-Studio/resolve/main

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --upgrade pillow

      - name: Clone Hugging Face Assets
        run: |
          set -euo pipefail
          rm -rf ../hf-assets
          git clone "https://huggingface.co/spaces/${HF_SPACE}" ../hf-assets
          git -C ../hf-assets lfs install --local || true
          git -C ../hf-assets lfs pull || true

      - name: Generate Gallery Data
        run: |
          set -euo pipefail
          if find ../hf-assets/assets/images -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' -o -iname '*.gif' \) 2>/dev/null | grep -q .; then
            echo "Using Hugging Face assets."
            GALLERY_ASSET_ROOT=../hf-assets GALLERY_PUBLIC_BASE_URL="${HF_PUBLIC_BASE_URL}" node scripts/generate-gallery.js
          else
            echo "Hugging Face assets not found; using local assets."
            node scripts/generate-gallery.js
          fi

      - name: Build Optimized Site
        run: |
          set -euo pipefail
          if grep -q 'huggingface.co/spaces' generated-gallery.js; then
            SKIP_LOCAL_GALLERY_ASSETS=1 python scripts/build-publish.py
          else
            python scripts/build-publish.py
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
